<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Confirmando Agendamento</title>
    <link rel="shortcut icon" href="./imagens/logo-oshiro.png" type="image/x-icon">

    <style>
        /* ESTILO DO BODY (centraliza tudo na tela e define fundo escuro) */
        body {
            margin: 0;
            font-family: Arial;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* CAIXA PRINCIPAL DO LOADING (centraliza texto e animação) */
        .box {
            text-align: center;
        }

        /* CÍRCULO DE LOADING (spinner animado) */
        .loader {
            width: 70px;
            height: 70px;
            border: 5px solid #333;
            border-top: 5px solid #c9a26b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        /* ANIMAÇÃO DE ROTAÇÃO DO LOADER */
        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }

        /* ESSE VCS JA SABEM*/
        h1 {
            color: #c9a26b;
            font-size: 22px;
        }

        /* TEXTO SECUNDÁRIO */
        p {
            color: #bbb;
            font-size: 14px;
        }
    </style>
</head>

<body>


<div class="box">
    <div class="loader"></div>

    <h1>Confirmando seu agendamento...</h1>
    <p>Aguarde, estamos te redirecionando para o WhatsApp</p>
</div>


<script>

    // PEGA OS DADOS SALVOS NO LOCALSTORAGE (É TIPO UM ARMAZENAMENTO NO DISPOSITIVO DA PESSOA)
    const dados = JSON.parse(localStorage.getItem("agendamento"));

    // SE NÃO EXISTIR DADOS, VOLTA PARA O FORMULÁRIO
    if (!dados) {
        window.location.href = "formulario.html";
    }

    // NÚMERO DO WHATSAPP DO DAVID
    const numero = "5511947018631";

    // MONTA A MENSAGEM QUE VAI NO WHATS
    const mensagem = `NOVO AGENDAMENTO

 Cliente: ${dados.nome}
 Telefone: ${dados.telefone}

 Serviço: ${dados.servico}
 Data: ${dados.data}
 Horário: ${dados.horario}

✔ Confirmar atendimento.`;

    // MONTA O LINK DO WHATSAPP COM A MENSAGEM CODIFICADA
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

    // REMOVE OS DADOS DO LOCALSTORAGE (EVITA DUPLICAR AGENDAMENTO)
    localStorage.removeItem("agendamento");

    // MANTÉM A TELA DE LOADING POR 2.0 SEGUNDOS ANTES DE REDIRECIONAR
    setTimeout(() => {
        window.location.href = url;
    }, 2000);

</script>

</body>
</html>
